<body class="bg-[#e8ede2]">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;
    const {
      ResponsiveContainer,
      LineChart,
      Line,
      XAxis,
      YAxis,
      CartesianGrid,
      Tooltip,
      Legend,
      ReferenceLine,
      ReferenceArea,
      BarChart,
      Bar,
      LabelList
    } = Recharts;

    const COLORS = ["#2563eb", "#16a34a", "#dc2626", "#d97706", "#7c3aed", "#0891b2", "#ea580c", "#db2777"];
    const WHO_24H_PM25 = 15;
    const PHASE_2_SENSORS = ["AG01-04", "AG02-05", "AG03-01"];
    const EXCLUDED_SENSOR_DAYS = [{ sensor: "AG02-02", date: "2026-02-14" }];
    const THERMAL_INVERSION = {
      startDate: "2026-02-11",
      endDate: "2026-02-13",
      label: "Confirmed Temperature Inversion"
    };

    function parseCsvLine(line) {
      const out = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          out.push(cur.trim());
          cur = "";
        } else {
          cur += ch;
        }
      }
      out.push(cur.trim());
      return out;
    }

    function normalizeHeader(h) {
      return String(h || "")
        .toLowerCase()
        .replace(/\s+/g, " ")
        .trim();
    }

    function pickIndex(headers, patterns) {
      for (const p of patterns) {
        const idx = headers.findIndex((h) => p(h));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function parseDateSafe(value) {
      if (!value) return null;
      const d = new Date(value);
      if (!Number.isNaN(d.getTime())) return d;

      const cleaned = String(value).replace(" ", "T");
      const d2 = new Date(cleaned);
      if (!Number.isNaN(d2.getTime())) return d2;

      return null;
    }

    function formatDateKey(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function App() {
      const [rawRows, setRawRows] = useState([]);
      const [error, setError] = useState("");
      const [warnings, setWarnings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [visibleSensors, setVisibleSensors] = useState([]);
      const [showAnomalies, setShowAnomalies] = useState(true);

      useEffect(() => {
        const preloaded = Array.isArray(window.PRELOADED_ROWS) ? window.PRELOADED_ROWS : [];
        if (!preloaded.length) return;
        setRawRows(preloaded);
        const nextSensors = Array.from(new Set(preloaded.map((r) => r.sensor))).sort();
        setVisibleSensors(nextSensors);
      }, []);

      const effectiveRows = useMemo(() => {
        return rawRows.filter((r) => !EXCLUDED_SENSOR_DAYS.some((x) => x.sensor === r.sensor && x.date === r.dateKey));
      }, [rawRows]);

      const sensors = useMemo(() => {
        return Array.from(new Set(effectiveRows.map((r) => r.sensor))).sort();
      }, [effectiveRows]);

      const dailySeries = useMemo(() => {
        if (!effectiveRows.length) return [];

        const map = new Map();
        for (const row of effectiveRows) {
          const key = `${row.dateKey}__${row.sensor}`;
          if (!map.has(key)) {
            map.set(key, { dateKey: row.dateKey, sensor: row.sensor, values: [] });
          }
          map.get(key).values.push(row.pm25);
        }

        const byDate = new Map();
        for (const v of map.values()) {
          const min = Math.min(...v.values);
          const max = Math.max(...v.values);
          const mean = v.values.reduce((a, b) => a + b, 0) / v.values.length;

          if (!byDate.has(v.dateKey)) byDate.set(v.dateKey, { date: v.dateKey });
          const day = byDate.get(v.dateKey);
          day[`${v.sensor}_mean`] = Number(mean.toFixed(2));
          day[`${v.sensor}_min`] = Number(min.toFixed(2));
          day[`${v.sensor}_max`] = Number(max.toFixed(2));
        }

        return Array.from(byDate.values()).sort((a, b) => (a.date < b.date ? -1 : 1));
      }, [effectiveRows]);

      const sensorSummary = useMemo(() => {
        const out = [];
        for (const sensor of sensors) {
          const vals = effectiveRows.filter((r) => r.sensor === sensor).map((r) => r.pm25);
          if (!vals.length) continue;
          out.push({
            sensor,
            mean: Number((vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2)),
            min: Number(Math.min(...vals).toFixed(2)),
            max: Number(Math.max(...vals).toFixed(2)),
            n: vals.length
          });
        }
        return out.sort((a, b) => b.mean - a.mean);
      }, [effectiveRows, sensors]);

      const stats = useMemo(() => {
        const values = effectiveRows.map((r) => r.pm25);
        if (!values.length) return null;
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        return {
          rows: values.length,
          sensors: sensors.length,
          min: Number(Math.min(...values).toFixed(2)),
          mean: Number(mean.toFixed(2)),
          max: Number(Math.max(...values).toFixed(2)),
          days: dailySeries.length
        };
      }, [effectiveRows, sensors, dailySeries]);

      const deploymentDates = useMemo(() => {
        const out = {};
        for (const sensor of sensors) {
          const first = effectiveRows
            .filter((r) => r.sensor === sensor)
            .sort((a, b) => (a.timestamp < b.timestamp ? -1 : 1))[0];
          if (first) out[sensor] = first.dateKey;
        }
        return out;
      }, [effectiveRows, sensors]);

      const getAxisConfig = (values) => {
        const maxObserved = values.length ? Math.max(...values) : 20;
        const yMax = Math.max(20, Math.ceil(maxObserved + 5));
        const tickStep = yMax <= 40 ? 5 : 10;
        const ticks = [];
        for (let v = 0; v <= yMax; v += tickStep) ticks.push(v);
        return { domain: [0, yMax], ticks, yMax };
      };

      // Phase-specific Y-axis ranges so one phase doesn't flatten the other.
      const phase1YAxisConfig = useMemo(() => {
        const vals = effectiveRows
          .filter((r) => visibleSensors.includes(r.sensor) && !PHASE_2_SENSORS.includes(r.sensor))
          .map((r) => r.pm25);
        return getAxisConfig(vals);
      }, [effectiveRows, visibleSensors]);

      const phase2YAxisConfig = useMemo(() => {
        const vals = effectiveRows
          .filter((r) => visibleSensors.includes(r.sensor) && PHASE_2_SENSORS.includes(r.sensor))
          .map((r) => r.pm25);
        return getAxisConfig(vals);
      }, [effectiveRows, visibleSensors]);

      // Combined axis for combined comparison chart.
      const combinedYAxisConfig = useMemo(() => {
        const vals = effectiveRows
          .filter((r) => visibleSensors.includes(r.sensor))
          .map((r) => r.pm25);
        return getAxisConfig(vals);
      }, [effectiveRows, visibleSensors]);

      const comparisonStats = useMemo(() => {
        const out = {};
        for (const sensor of sensors) {
          const hourly = effectiveRows.filter((r) => r.sensor === sensor).map((r) => r.pm25);
          const dailyMeans = dailySeries
            .map((d) => d[`${sensor}_mean`])
            .filter((v) => typeof v === "number");

          if (!hourly.length || !dailyMeans.length) continue;
          out[sensor] = {
            hr1Min: Math.min(...hourly),
            hr1Mean: hourly.reduce((a, b) => a + b, 0) / hourly.length,
            hr1Max: Math.max(...hourly),
            hr24Min: Math.min(...dailyMeans),
            hr24Mean: dailyMeans.reduce((a, b) => a + b, 0) / dailyMeans.length,
            hr24Max: Math.max(...dailyMeans)
          };
        }
        return out;
      }, [effectiveRows, dailySeries, sensors]);

      const comparisonBarData = useMemo(() => {
        const items = sensors
          .filter((s) => visibleSensors.includes(s))
          .map((sensor, i) => {
            const s = comparisonStats[sensor];
            if (!s) return null;
            const activeDays = dailySeries.filter((d) => typeof d[`${sensor}_mean`] === "number");
            const firstDay = activeDays[0]?.date;
            const lastDay = activeDays[activeDays.length - 1]?.date;
            const toShort = (d) => {
              if (!d) return "";
              const [y, m, day] = d.split("-");
              return `${Number(m)}/${day}`;
            };
            return {
              name: sensor,
              baseColor: COLORS[i % COLORS.length],
              dateRange: firstDay && lastDay ? `${toShort(firstDay)} - ${toShort(lastDay)}` : "",
              sortDate: firstDay || "9999-99-99",
              "1-Hr Min": Number(s.hr1Min.toFixed(2)),
              "24-Hr Min": Number(s.hr24Min.toFixed(2)),
              "1-Hr Mean": Number(s.hr1Mean.toFixed(2)),
              "24-Hr Mean": Number(s.hr24Mean.toFixed(2)),
              "1-Hr Max": Number(s.hr1Max.toFixed(2)),
              "24-Hr Max": Number(s.hr24Max.toFixed(2))
            };
          })
          .filter(Boolean);

        items.sort((a, b) => new Date(a.sortDate) - new Date(b.sortDate));
        return items;
      }, [sensors, visibleSensors, comparisonStats, dailySeries]);

      function getLegendPayloadForSensors(sensorList) {
        return sensorList.map((sensor) => {
          const idx = sensors.indexOf(sensor);
          return {
            id: sensor,
            type: "circle",
            value: sensor,
            color: COLORS[(idx >= 0 ? idx : 0) % COLORS.length]
          };
        });
      }

      const visiblePhase2Sensors = useMemo(
        () => visibleSensors.filter((s) => PHASE_2_SENSORS.includes(s)),
        [visibleSensors]
      );
      const visiblePhase1Sensors = useMemo(
        () => visibleSensors.filter((s) => !PHASE_2_SENSORS.includes(s)),
        [visibleSensors]
      );
      const phase1ChartData = useMemo(
        () =>
          dailySeries.filter((day) =>
            visiblePhase1Sensors.some((s) => typeof day[`${s}_mean`] === "number")
          ),
        [dailySeries, visiblePhase1Sensors]
      );
      const phase2ChartData = useMemo(
        () =>
          dailySeries.filter((day) =>
            visiblePhase2Sensors.some((s) => typeof day[`${s}_mean`] === "number")
          ),
        [dailySeries, visiblePhase2Sensors]
      );

      function ensureVisibleSensors(nextSensors) {
        setVisibleSensors((prev) => {
          const kept = prev.filter((s) => nextSensors.includes(s));
          const missing = nextSensors.filter((s) => !kept.includes(s));
          return [...kept, ...missing];
        });
      }

      function toggleSensor(sensor) {
        setVisibleSensors((prev) => (prev.includes(sensor) ? prev.filter((s) => s !== sensor) : [...prev, sensor]));
      }

      function renderTopLegend(showAnomaliesLegend = true) {
        return (
          <div className="flex flex-wrap items-center gap-6 mt-2 mb-4">
            <div className="flex items-center gap-2">
              <span className="w-6 h-0 border-b-[3px] border-red-500 border-dashed"></span>
              <span className="text-sm font-bold text-slate-700">WHO 24h Guideline (15 µg/m³)</span>
            </div>
            {showAnomaliesLegend && showAnomalies && (
              <div className="flex items-center gap-2">
                <div className="w-4 h-4 rounded-sm border border-rose-200 bg-rose-100"></div>
                <span className="text-sm font-bold text-slate-700">{THERMAL_INVERSION.label}</span>
              </div>
            )}
          </div>
        );
      }

      function renderCustomBarLabel({ x, y, width, value }, color) {
        if (value == null) return null;
        return (
          <g transform={`translate(${x + width / 2},${y - 6})`}>
            <text
              x={0}
              y={0}
              dy={4}
              textAnchor="start"
              fill={color}
              fontSize={11}
              fontWeight={800}
              transform="rotate(-90)"
            >
              {Number(value).toFixed(1)}
            </text>
          </g>
        );
      }

      function exportDailyCsv() {
        if (!dailySeries.length || !sensors.length) return;

        const cols = ["date"];
        for (const s of sensors) {
          cols.push(`${s}_mean`, `${s}_min`, `${s}_max`);
        }

        const lines = [cols.join(",")];
        for (const row of dailySeries) {
          lines.push(cols.map((c) => (row[c] ?? "")).join(","));
        }

        const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "daily_pm25_aggregated.csv";
        a.click();
      }

      async function handleFiles(fileList) {
        setLoading(true);
        setError("");
        const localWarnings = [];

        try {
          const files = Array.from(fileList || []);
          const parsed = [];

          for (const file of files) {
            if (!file.name.toLowerCase().endsWith(".csv")) {
              localWarnings.push(`${file.name}: skipped (not CSV).`);
              continue;
            }

            const text = await file.text();
            const lines = text.split(/\r?\n/).filter((x) => x.trim().length > 0);
            if (lines.length < 2) {
              localWarnings.push(`${file.name}: skipped (empty or no data rows).`);
              continue;
            }

            const rawHeaders = parseCsvLine(lines[0]);
            const headers = rawHeaders.map(normalizeHeader);

            const pmCorrectedIdx = pickIndex(headers, [
              (h) => h.includes("pm2.5") && h.includes("corrected"),
              (h) => h.includes("pm2_5") && h.includes("corrected"),
              (h) => h.includes("pm2.5") && h.includes("cf=1"),
              (h) => h === "pm2.5 corrected",
              (h) => h === "corrected pm2.5"
            ]);

            if (pmCorrectedIdx === -1) {
              localWarnings.push(`${file.name}: skipped (no corrected PM2.5 column found).`);
              continue;
            }

            const datetimeIdx = pickIndex(headers, [
              (h) => h.includes("local date/time"),
              (h) => h.includes("date/time"),
              (h) => h.includes("timestamp"),
              (h) => h === "datetime",
              (h) => h === "date"
            ]);

            if (datetimeIdx === -1) {
              localWarnings.push(`${file.name}: skipped (no datetime column found).`);
              continue;
            }

            const sensorIdx = pickIndex(headers, [
              (h) => h.includes("location name"),
              (h) => h.includes("device name"),
              (h) => h.includes("serial"),
              (h) => h === "location",
              (h) => h === "sensor"
            ]);

            let validRows = 0;
            for (let i = 1; i < lines.length; i += 1) {
              const cols = parseCsvLine(lines[i]);
              const pmValue = Number(cols[pmCorrectedIdx]);
              const dt = parseDateSafe(cols[datetimeIdx]);

              if (Number.isNaN(pmValue) || !dt) continue;

              const sensor = sensorIdx !== -1 && cols[sensorIdx]
                ? cols[sensorIdx].trim()
                : file.name.replace(/\.csv$/i, "");

              parsed.push({
                sensor,
                timestamp: dt.toISOString(),
                dateKey: formatDateKey(dt),
                pm25: pmValue
              });
              validRows += 1;
            }

            if (validRows === 0) {
              localWarnings.push(`${file.name}: parsed header but found 0 valid corrected PM2.5 rows.`);
            }
          }

          if (!parsed.length) {
            throw new Error("No valid corrected PM2.5 rows were parsed. Check column names and file format.");
          }

          const dedup = new Map();
          for (const r of parsed) dedup.set(`${r.sensor}__${r.timestamp}`, r);
          const finalRows = Array.from(dedup.values()).sort((a, b) => (a.timestamp < b.timestamp ? -1 : 1));

          setRawRows(finalRows);
          const nextSensors = Array.from(new Set(finalRows.map((r) => r.sensor))).sort();
          ensureVisibleSensors(nextSensors);
          setWarnings(localWarnings);
        } catch (e) {
          setError(e.message || "Failed to parse uploaded files.");
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="max-w-7xl mx-auto p-6 md:p-10 space-y-6">
          <header className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
            <h1 className="text-3xl font-black text-slate-900">AirGradient Corrected PM2.5 Dashboard</h1>
          </header>

          <section className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
            <label className="inline-block px-5 py-3 bg-slate-900 text-white font-semibold rounded-xl cursor-pointer hover:bg-slate-800">
              Upload AirGradient CSV Files
              <input
                type="file"
                accept=".csv"
                multiple
                className="hidden"
                onChange={(e) => handleFiles(e.target.files)}
              />
            </label>
            <p className="text-sm text-slate-500 mt-3">
              Required: corrected PM2.5 column + datetime column. Sensor/location column is optional.
            </p>

            {loading && <p className="mt-4 text-blue-700 font-semibold">Parsing files...</p>}
            {error && <p className="mt-4 text-red-700 font-semibold">{error}</p>}
            {warnings.length > 0 && (
              <div className="mt-4 bg-amber-50 border border-amber-200 rounded-lg p-3 text-amber-800 text-sm">
                {warnings.map((w, i) => <div key={i}>- {w}</div>)}
              </div>
            )}
          </section>

          {stats && (
            <section className="grid grid-cols-2 md:grid-cols-6 gap-3">
              <div className="bg-[#f3f6ed] border border-[#c7d0b7] rounded-xl p-4 shadow-[3px_3px_0_#c7d0b7]"><div className="text-xs text-slate-500">Rows</div><div className="text-xl font-bold">{stats.rows}</div></div>
              <div className="bg-[#f3f6ed] border border-[#c7d0b7] rounded-xl p-4 shadow-[3px_3px_0_#c7d0b7]"><div className="text-xs text-slate-500">Sensors</div><div className="text-xl font-bold">{stats.sensors}</div></div>
              <div className="bg-[#f3f6ed] border border-[#c7d0b7] rounded-xl p-4 shadow-[3px_3px_0_#c7d0b7]"><div className="text-xs text-slate-500">Days</div><div className="text-xl font-bold">{stats.days}</div></div>
              <div className="bg-[#f3f6ed] border border-[#c7d0b7] rounded-xl p-4 shadow-[3px_3px_0_#c7d0b7]"><div className="text-xs text-slate-500">Min</div><div className="text-xl font-bold">{stats.min}</div></div>
              <div className="bg-[#f3f6ed] border border-[#c7d0b7] rounded-xl p-4 shadow-[3px_3px_0_#c7d0b7]"><div className="text-xs text-slate-500">Mean</div><div className="text-xl font-bold">{stats.mean}</div></div>
              <div className="bg-[#f3f6ed] border border-[#c7d0b7] rounded-xl p-4 shadow-[3px_3px_0_#c7d0b7]"><div className="text-xs text-slate-500">Max</div><div className="text-xl font-bold">{stats.max}</div></div>
            </section>
          )}

          {stats && (
            <section className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm text-blue-900">
              Phase-specific PM2.5 axes (max data point + 5 µg/m³): Phase 1 = {phase1YAxisConfig.yMax}, Phase 2 = {phase2YAxisConfig.yMax}, Combined = {combinedYAxisConfig.yMax}.
            </section>
          )}


          {sensors.length > 0 && (
            <section className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
              <div className="flex flex-wrap gap-2 items-center">
                {sensors.map((s, i) => {
                  const on = visibleSensors.includes(s);
                  return (
                    <button
                      key={s}
                      onClick={() => toggleSensor(s)}
                      className={`px-3 py-1.5 rounded-lg text-sm font-semibold border ${on ? "text-white border-transparent" : "text-slate-700 border-[#c7d0b7] bg-[#f3f6ed]"}`}
                      style={on ? { backgroundColor: COLORS[i % COLORS.length] } : {}}
                    >
                      {s}
                    </button>
                  );
                })}
                <button className="px-3 py-1.5 rounded-lg text-sm font-semibold border border-slate-300" onClick={() => setVisibleSensors(sensors)}>Show all</button>
                <button className="px-3 py-1.5 rounded-lg text-sm font-semibold border border-slate-300" onClick={() => setVisibleSensors([])}>Hide all</button>
                <button
                  onClick={() => setShowAnomalies((v) => !v)}
                  className={`px-3 py-1.5 rounded-lg text-sm font-semibold border ${showAnomalies ? "bg-rose-50 text-rose-700 border-rose-200" : "border-slate-300"}`}
                >
                  Thermal Inversion Overlay
                </button>
              </div>
            </section>
          )}

          {dailySeries.length > 0 && (
            <>
              <section className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
                <div className="flex items-center justify-between mb-4">
                  <h2 className="text-xl font-bold">Phase 1 Daily Mean Corrected PM2.5</h2>
                </div>
                {renderTopLegend(true)}
                <div className="h-96">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={phase1ChartData} margin={{ top: 20, right: 20, left: 10, bottom: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" />
                      {showAnomalies && (
                        <ReferenceArea x1={THERMAL_INVERSION.startDate} x2={THERMAL_INVERSION.endDate} fill="#e11d48" fillOpacity={0.08} strokeOpacity={0} />
                      )}
                      <XAxis dataKey="date" />
                      <YAxis domain={[0, 30]} ticks={[0, 5, 10, 15, 20, 25, 30]} label={{ value: "PM2.5 (µg/m³)", angle: -90, position: "insideLeft" }} />
                      <Tooltip />
                      <Legend payload={getLegendPayloadForSensors(visiblePhase1Sensors)} />
                      <ReferenceLine y={WHO_24H_PM25} stroke="#dc2626" strokeDasharray="6 4" />
                      {sensors.map((s, i) => visiblePhase1Sensors.includes(s) && (
                        <Line key={`phase1-${s}-mean`} type="monotone" dataKey={`${s}_mean`} name={s} stroke={COLORS[i % COLORS.length]} dot={false} strokeWidth={2.8} connectNulls={false} />
                      ))}
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </section>

              <section className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
                <h2 className="text-xl font-bold mb-4">Phase 1 Daily Max Corrected PM2.5</h2>
                {renderTopLegend(true)}
                <div className="h-96">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={phase1ChartData} margin={{ top: 20, right: 20, left: 10, bottom: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" />
                      {showAnomalies && (
                        <ReferenceArea x1={THERMAL_INVERSION.startDate} x2={THERMAL_INVERSION.endDate} fill="#e11d48" fillOpacity={0.08} strokeOpacity={0} />
                      )}
                      <XAxis dataKey="date" />
                      <YAxis domain={phase1YAxisConfig.domain} ticks={phase1YAxisConfig.ticks} label={{ value: "PM2.5 (µg/m³)", angle: -90, position: "insideLeft" }} />
                      <Tooltip />
                      <Legend payload={getLegendPayloadForSensors(visiblePhase1Sensors)} />
                      <ReferenceLine y={WHO_24H_PM25} stroke="#dc2626" strokeDasharray="6 4" />
                      {sensors.map((s, i) => visiblePhase1Sensors.includes(s) && (
                        <Line key={`phase1-${s}-max`} type="monotone" dataKey={`${s}_max`} name={s} stroke={COLORS[i % COLORS.length]} dot={false} strokeWidth={2.6} connectNulls={false} />
                      ))}
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </section>

              <section className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
                <h2 className="text-xl font-bold mb-4">Phase 2 Daily Mean Corrected PM2.5</h2>
                {renderTopLegend(true)}
                <div className="h-96">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={phase2ChartData} margin={{ top: 20, right: 20, left: 10, bottom: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" />
                      {showAnomalies && (
                        <ReferenceArea x1={THERMAL_INVERSION.startDate} x2={THERMAL_INVERSION.endDate} fill="#e11d48" fillOpacity={0.08} strokeOpacity={0} />
                      )}
                      <XAxis dataKey="date" />
                      <YAxis domain={[0, 30]} ticks={[0, 5, 10, 15, 20, 25, 30]} label={{ value: "PM2.5 (µg/m³)", angle: -90, position: "insideLeft" }} />
                      <Tooltip />
                      <Legend payload={getLegendPayloadForSensors(visiblePhase2Sensors)} />
                      <ReferenceLine y={WHO_24H_PM25} stroke="#dc2626" strokeDasharray="6 4" />
                      {sensors.map((s, i) => visiblePhase2Sensors.includes(s) && (
                        <Line key={`phase2-${s}-mean`} type="monotone" dataKey={`${s}_mean`} name={s} stroke={COLORS[i % COLORS.length]} dot={false} strokeWidth={2.8} connectNulls={false} />
                      ))}
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </section>

              <section className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
                <h2 className="text-xl font-bold mb-4">Phase 2 Daily Max Corrected PM2.5</h2>
                {renderTopLegend(true)}
                <div className="h-96">
                  <ResponsiveContainer width="100%" height="100%">
                    <LineChart data={phase2ChartData} margin={{ top: 20, right: 20, left: 10, bottom: 10 }}>
                      <CartesianGrid strokeDasharray="3 3" />
                      {showAnomalies && (
                        <ReferenceArea x1={THERMAL_INVERSION.startDate} x2={THERMAL_INVERSION.endDate} fill="#e11d48" fillOpacity={0.08} strokeOpacity={0} />
                      )}
                      <XAxis dataKey="date" />
                      <YAxis domain={phase2YAxisConfig.domain} ticks={phase2YAxisConfig.ticks} label={{ value: "PM2.5 (µg/m³)", angle: -90, position: "insideLeft" }} />
                      <Tooltip />
                      <Legend payload={getLegendPayloadForSensors(visiblePhase2Sensors)} />
                      <ReferenceLine y={WHO_24H_PM25} stroke="#dc2626" strokeDasharray="6 4" />
                      {sensors.map((s, i) => visiblePhase2Sensors.includes(s) && (
                        <Line key={`phase2-${s}-max`} type="monotone" dataKey={`${s}_max`} name={s} stroke={COLORS[i % COLORS.length]} dot={false} strokeWidth={2.6} connectNulls={false} />
                      ))}
                    </LineChart>
                  </ResponsiveContainer>
                </div>
              </section>
            </>
          )}

          {comparisonBarData.length > 0 && (
            <section className="bg-[#f3f6ed] rounded-2xl border border-[#c7d0b7] p-6 shadow-[4px_4px_0_#c7d0b7]">
              <h2 className="text-xl font-bold mb-1">PM2.5 Exposure: 1-Hour vs 24-Hour Statistics</h2>
              <p className="text-sm text-slate-500 mb-3">
                Hourly extremes compared against daily-mean extremes for each visible sensor.
              </p>
              {renderTopLegend(false)}
              <div className="h-[520px]">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={comparisonBarData} margin={{ top: 55, right: 20, left: 10, bottom: 80 }}>
                    <CartesianGrid strokeDasharray="4 4" vertical={false} stroke="#e2e8f0" />
                    <XAxis
                      dataKey="name"
                      interval={0}
                      axisLine={false}
                      tickLine={false}
                      height={90}
                      minTickGap={0}
                      tick={({ x, y, payload }) => {
                        const row = comparisonBarData.find((d) => d.name === payload.value);
                        return (
                          <g transform={`translate(${x},${y})`}>
                            <text x={0} y={0} dy={16} textAnchor="middle" fill={row?.baseColor || "#334155"} fontSize={13} fontWeight={800}>
                              {payload.value}
                            </text>
                            <text x={0} y={0} dy={33} textAnchor="middle" fill="#64748b" fontSize={11} fontWeight={600}>
                              {row?.dateRange || ""}
                            </text>
                          </g>
                        );
                      }}
                    />
                    <YAxis domain={combinedYAxisConfig.domain} ticks={combinedYAxisConfig.ticks} />
                    <Tooltip />
                    <Legend
                      payload={[
                        { id: "1-Hr Min", value: "1-Hr Min", type: "square", color: "#6ee7b7" },
                        { id: "24-Hr Min", value: "24-Hr Min", type: "square", color: "#10b981" },
                        { id: "1-Hr Mean", value: "1-Hr Mean", type: "square", color: "#93c5fd" },
                        { id: "24-Hr Mean", value: "24-Hr Mean", type: "square", color: "#3b82f6" },
                        { id: "1-Hr Max", value: "1-Hr Max", type: "square", color: "#fb7185" },
                        { id: "24-Hr Max", value: "24-Hr Max", type: "square", color: "#e11d48" }
                      ]}
                      wrapperStyle={{ fontSize: "13px", fontWeight: 600 }}
                    />

                    <Bar dataKey="1-Hr Min" fill="#6ee7b7" radius={[4, 4, 0, 0]}>
                      <LabelList dataKey="1-Hr Min" content={(props) => renderCustomBarLabel(props, "#059669")} />
                    </Bar>
                    <Bar dataKey="24-Hr Min" fill="#10b981" radius={[4, 4, 0, 0]}>
                      <LabelList dataKey="24-Hr Min" content={(props) => renderCustomBarLabel(props, "#065f46")} />
                    </Bar>
                    <Bar dataKey="1-Hr Mean" fill="#93c5fd" radius={[4, 4, 0, 0]}>
                      <LabelList dataKey="1-Hr Mean" content={(props) => renderCustomBarLabel(props, "#2563eb")} />
                    </Bar>
                    <Bar dataKey="24-Hr Mean" fill="#3b82f6" radius={[4, 4, 0, 0]}>
                      <LabelList dataKey="24-Hr Mean" content={(props) => renderCustomBarLabel(props, "#1e40af")} />
                    </Bar>
                    <Bar dataKey="1-Hr Max" fill="#fb7185" radius={[4, 4, 0, 0]}>
                      <LabelList dataKey="1-Hr Max" content={(props) => renderCustomBarLabel(props, "#e11d48")} />
                    </Bar>
                    <Bar dataKey="24-Hr Max" fill="#e11d48" radius={[4, 4, 0, 0]}>
                      <LabelList dataKey="24-Hr Max" content={(props) => renderCustomBarLabel(props, "#9f1239")} />
                    </Bar>
                    <ReferenceLine y={WHO_24H_PM25} stroke="#ef4444" strokeDasharray="5 5" strokeWidth={2.5} opacity={0.45} isFront={true} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </section>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
